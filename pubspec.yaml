name: human_readable_number
description: Dart package to convert numbers into human-readable format like 1.2K, 1L, 1Cr.
version: 1.0.3

homepage: https://github.com/sidkhore1002/human_readable_number
repository: https://github.com/sidkhore1002/human_readable_number
issue_tracker: https://github.com/sidkhore1002/human_readable_number/issues

topics:
  - dart
  - flutter
  - utility
  - number-format
  - human-readable

environment:
  sdk: ">=2.17.0 <4.0.0"
  flutter: ">=1.17.0"

dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

